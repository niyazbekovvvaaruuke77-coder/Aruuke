<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Корзина</title>
  
        <link rel="stylesheet" href="cart.css">
</head>
<body>

  <div class="cart-box">
    <h2>Корзина</h2>

    <div class="sum">Сумма: <span id="total">0</span>$</div>

    <div id="cart-items" class="cart-items">
      <div class="empty">Корзина пуста</div>
    </div>

    <button class="order" onclick="checkout()">Оформить заказ</button>
    <button class="clear" onclick="clearCart()">Очистить корзину</button>
    <button class="back" onclick="goBack()">Назад</button>
  </div>

  <script>
    function loadCart() {
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      const cartItems = document.getElementById("cart-items");
      const totalElement = document.getElementById("total");

      cartItems.innerHTML = "";
      let total = 0;

      if (cart.length === 0) {
        cartItems.innerHTML = '<div class="empty">Корзина пуста</div>';
        totalElement.textContent = "0";
        return;
      }

      cart.forEach((item) => {
        total += item.price;

        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
          <span>${item.name}</span>
          <span>$${item.price}</span>
        `;

        cartItems.appendChild(div);
      });

      totalElement.textContent = total;
    }

    function checkout() {
      const cart = JSON.parse(localStorage.getItem("cart")) || [];

      if (cart.length === 0) {
        alert("Корзина пуста");
        return;
      }

      alert("Заказ оформлен!");
      localStorage.removeItem("cart");
      loadCart();
    }

    function clearCart() {
      localStorage.removeItem("cart");
      loadCart();
    }

    function goBack() {
      window.location.href = "menu.html";
    }

    loadCart();
  </script>

</body>
</html>
