<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yellow Kitchen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
<header class="header">
    <div class="header_container">
    <div class="logo"><span class="yellow">yellow</span>kitchen</div>
    <nav>
      <ul class="nav-links">
        <li><a href="#">Log in</a></li>
        <li><a href="#">Cart (0)</a></li>
      </ul>
    </nav>
    </div>
  </header>

  <!-- Main content -->
  <main class="main-content">
    <!-- Левый блок с текстом -->
    <div class="text-block">
        <div class="text_content">
              <h1 class="title">Your Food court at home</h1>
                <div class="buttons">
                    <button>Delivery</button>
                    <button>Takeout</button>
                </div>
                <div class="delivery-info">
                    <p>Fast delivery, fresh food, and safe packaging!</p>
                </div>
        </div>
    
       <div class="image-block">
      <img src="./images/Photo.png" alt="Fresh salad">
         </div>
    </div>

    <!-- Правый блок с фото -->
   
    
  </main>

  <section class="bottom-image">
    <img src="./images/Block-restaurants (2).png" alt="restaurants">
</section>

</body>
</html>
